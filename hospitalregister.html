<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Registration</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}



body{

    height:100vh;
    background:linear-gradient(120deg,#198754,#0d6efd);
    display:flex;
    justify-content:center;
    align-items:center;

}



.container{

    width:450px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);

}



.logo{

    text-align:center;
    font-size:60px;

}



h2{

    text-align:center;
    color:#198754;
    margin:15px;

}



label{

    font-weight:bold;

}



input{

    width:100%;
    padding:12px;
    margin:8px 0 15px;
    border-radius:10px;
    border:1px solid #ccc;

}



button{

    width:100%;
    padding:13px;
    background:#198754;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;

}



button:hover{

    background:#146c43;

}



.login{

    text-align:center;
    margin-top:15px;

}



a{

    color:#198754;
    font-weight:bold;
    text-decoration:none;

}


</style>

</head>



<body>



<div class="container">


<div class="logo">🏥</div>


<h2>Hospital Register</h2>



<form>



<label>Hospital Name</label>
<input type="text" placeholder="Enter Hospital Name">



<label>Address</label>
<input type="text" placeholder="Enter Address">



<label>City</label>
<input type="text" placeholder="Enter City">



<label>Phone Number</label>
<input type="tel" placeholder="Enter Phone Number">



<label>Username</label>
<input type="text" placeholder="Create Username">



<label>Password</label>
<input type="password" placeholder="Create Password">



<button type="submit">
Register Hospital
</button>



<div class="login">

Already Registered?
<a href="hospital-login.html">Login</a>

</div>



</form>



</div>


</body>

</html>
