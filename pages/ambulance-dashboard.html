<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <title>Driver Dashboard</title>

 <link rel="stylesheet" href="/css/ambulance-dashboard.css">
</head>

<body>

<header>

    <h1>🚑 Driver Dashboard</h1>

    <button class="logout-btn">Logout</button>

</header>

<div class="container">

    <div class="card">

        <h2>Nearby Hospitals</h2>

        <table>

            <tr>
                <th>Hospital</th>
                <th>City</th>
                <th>Normal</th>
                <th>ICU</th>
                <th>Emergency</th>
                <th>Map</th>
                <th>Request</th>
            </tr>

            <tr>
                <td>Ruby Hall</td>
                <td>Pune</td>
                <td>12</td>
                <td>5</td>
                <td>2</td>

                <td>
                    <button class="map-btn">Open Map</button>
                </td>

                <td>
                    <button class="request-btn">Request</button>
                </td>

            </tr>

        </table>

    </div>

</div>

</body>
</html>
