<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <title>Driver Dashboard</title>

 <link rel="stylesheet" href="/css/ambulance-dashboard.css">
</head>

<body>

<header>

    <h1>🚑 Driver Dashboard</h1>

    <button class="logout-btn">Logout</button>

</header>

<div class="container">

<div class="card">
<h2>Available Hospitals</h2>

<table border="1">

<thead>

<tr>
<th>Hospital</th>
<th>City</th>
<th>Normal</th>
<th>ICU</th>
<th>Emergency</th>
<th>Phone</th>
</tr>

</thead>

<tbody id="hospitalTable">

</tbody>

</table>

</div>

</div>
<script>

fetch("http://localhost:3000/bed/available")
.then(res=>res.json())
.then(data=>{

let output="";

data.forEach(hospital=>{

output+=`
<tr>

<td>${hospital.hospital_name}</td>
<td>${hospital.city}</td>
<td>${hospital.normal_beds}</td>
<td>${hospital.icu_beds}</td>
<td>${hospital.emergency_beds}</td>
<td>${hospital.phone}</td>

</tr>
`;

});

document.getElementById("hospitalTable").innerHTML=output;

});

</script>
</body>
</html>
