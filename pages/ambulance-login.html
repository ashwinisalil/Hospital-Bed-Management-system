<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ambulance Driver Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
background:linear-gradient(rgba(0,123,255,.7),rgba(0,123,255,.7)),
url("https://images.unsplash.com/photo-1587745416684-47953f16f02f?auto=format&fit=crop&w=1500&q=80");
background-size:cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.login-box{
background:white;
padding:35px;
width:400px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:#dc3545;
font-weight:bold;
}

.logo{
font-size:60px;
text-align:center;
color:#dc3545;
margin-bottom:15px;
}

.btn{
width:100%;
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
<i class="fa-solid fa-truck-medical"></i>
</div>

<h2>Ambulance Driver Login</h2>

<form action="http://localhost:3000/ambulance/login" method="POST">
    

<div class="mb-3">
<label>Username</label>
<input type="text" class="form-control" placeholder="Enter Username" name="username" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" placeholder="Enter Password" name="password" required>
</div>

<div class="mb-3">
<button class="btn btn-danger" type="submit">Login</button>
</div>


<p class="text-center">
<a href="index.html">← Back to Home</a>
</p>

</form>

</div>

</body>
</html>
