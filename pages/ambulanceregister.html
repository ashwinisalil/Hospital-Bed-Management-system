<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ambulance Registration</title>
<link rel="stylesheet" href="../css/ambulance.css">

</head>


<body>


<div class="container">

<div class="logo">🚑</div>

<h2>Ambulance Register</h2>


<form action="http://localhost:3000/ambulance/register" method="POST">


<label>Driver Name</label>
<input type="text" placeholder="Enter Driver Name" name="driver_name">


<label>Vehicle Number</label>
<input type="text" placeholder="Enter Vehicle Number" name="vehicle_number">


<label>Phone Number</label>
<input type="number" placeholder="Enter Phone Number" name="phone">


<label>Username</label>
<input type="text" placeholder="Create Username" name="username">


<label>Password</label>
<input type="password" placeholder="Create Password" name="password">



<button type="submit">
Register Ambulance
</button>



<div class="login">

Already Registered?
<a href="ambulance-login.html">Login</a>

</div>


</form>


</div>

</body>

</html>
