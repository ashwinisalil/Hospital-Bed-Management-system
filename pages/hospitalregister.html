<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Registration</title>
<link rel="stylesheet" href="../css/hospital.css">

</head>



<body>



<div class="container">


<div class="logo">🏥</div>


<h2>Hospital Register</h2>



<form action="http://localhost:3000/hospital/register" method="POST"> 



<label>Hospital Name</label>
<input type="text" placeholder="Enter Hospital Name" name="hospital_name">



<label>Address</label>
<input type="text" placeholder="Enter Address" name="address">



<label>City</label>
<input type="text" placeholder="Enter City"  name="city">



<label>Phone Number</label>
<input type="number" placeholder="Enter Phone Number" name="phone">



<label>Username</label>
<input type="text" placeholder="Create Username" name="username">



<label>Password</label>
<input type="password" placeholder="Create Password" name="password">



<button type="submit">
Register Hospital
</button>



<div class="login">

Already Registered?
<a href="hospital-login.html">Login</a>

</div>



</form>



</div>


</body>

</html>
